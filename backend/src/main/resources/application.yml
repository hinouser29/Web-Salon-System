server:
  port: 8080

spring:
  application:
    name: spa-management-backend
  datasource:
    url: jdbc:postgresql://db.aorrdsecmfvdauvozxgo.supabase.co:5432/postgres
    username: postgres
    password: YOUR_SUPABASE_PASSWORD
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 5MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-at-least-256-bits-for-hs256}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 604800000
  verification-token-expiration-hours: 24
  password-reset-token-expiration-hours: 1
  frontend-url: ${FRONTEND_URL:http://localhost:8080}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/oauth/callback}
  cookie:
    access-token-name: spa_access_token
    refresh-token-name: spa_refresh_token
    secure: ${COOKIE_SECURE:false}
    max-age-access-seconds: 3600
    max-age-refresh-seconds: 604800
  upload:
    avatar-dir: uploads/avatars
    allowed-content-types: image/jpeg,image/png,image/webp

springdoc:
  swagger-ui:
    path: /swagger-ui.html
