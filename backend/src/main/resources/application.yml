spring:
  application:
    name: spa-management-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spa_management}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 5MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-at-least-256-bits-for-hs256}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 604800000
  verification-token-expiration-hours: 24
  password-reset-token-expiration-hours: 1
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth/callback}
  upload:
    avatar-dir: uploads/avatars
    allowed-content-types: image/jpeg,image/png,image/webp

springdoc:
  swagger-ui:
    path: /swagger-ui.html
