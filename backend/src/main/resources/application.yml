server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: spa-management-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=${DB_SSL_MODE:prefer}&prepareThreshold=0
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 5MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-at-least-256-bits-for-hs256}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 604800000
  otp-expiration-minutes: 5
  verification-token-expiration-hours: 24
  password-reset-token-expiration-hours: 1
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/oauth/callback}
  cookie:
    access-token-name: spa_access_token
    refresh-token-name: spa_refresh_token
    secure: ${COOKIE_SECURE:false}
    max-age-access-seconds: 3600
    max-age-refresh-seconds: 604800
  upload:
    avatar-dir: uploads/avatars
    allowed-content-types: image/jpeg,image/png,image/webp

# Supabase Realtime configuration
supabase:
  url: ${SUPABASE_URL:}
  anon-key: ${SUPABASE_ANON_KEY:}
  realtime:
    tables: ${SUPABASE_REALTIME_TABLES:appointments,notifications}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
