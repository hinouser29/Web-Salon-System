<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body>
<div class="container">
    <h2>Forgot Password</h2>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <form th:action="@{/forgot-password}" method="post" th:object="${forgotRequest}">
        <label>Email</label>
        <input type="email" th:field="*{email}" required/>
        <button type="submit">Send reset link</button>
    </form>
    <p style="margin-top:12px;"><a th:href="@{/login}">Back to login</a></p>
</div>
</body>
</html>
