<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body>
<div class="container">
    <h2>Reset Password</h2>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <form th:action="@{/reset-password}" method="post" th:object="${resetRequest}">
        <input type="hidden" th:field="*{token}"/>
        <label>New password</label>
        <input type="password" th:field="*{newPassword}" required minlength="8"/>
        <button type="submit">Reset password</button>
    </form>
    <p style="margin-top:12px;"><a th:href="@{/login}">Back to login</a></p>
</div>
</body>
</html>
