<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>
<div class="container">
    <h2>Register</h2>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" th:object="${registerRequest}">
        <label>Full name</label>
        <input type="text" th:field="*{fullName}"/>
        <label>Email</label>
        <input type="email" th:field="*{email}" required/>
        <label>Password</label>
        <input type="password" th:field="*{password}" required minlength="8"/>
        <button type="submit">Register</button>
    </form>
    <p style="margin-top:12px;"><a th:href="@{/login}">Back to login</a></p>
</div>
</body>
</html>
